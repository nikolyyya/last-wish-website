<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - DigWill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section class="logow">
    <div class="container">
        <h2>🔒DigWill</h2>
    </div>
    <div class="entrance">
        <h1>Войти / Sign in</h1>
    </div>
    <div class="emai">
        <h3>Электронная почта или имя пользователя / Email or username</h3>
    </div>
</section>
<form action="#" method="post" class="login-form">
    <div class="input-group">
        <label for="email">
            <span class="sub-text"></span>
        </label>
        <input type="email" name="email" id="email" placeholder="Введите email">
    </div>
    <div class="pass1">
        <h3>Пароль / Password</h3>
    </div>
    <div class="input-group">
        <label for="password">
            <span class="sub-text"></span>
        </label>
        <input type="password" name="password" id="password" placeholder="Введите пароль">
    </div>
    <section class="btngr">
    <div class="container">
        <div class="btn-en">
            <button type="submit" class="btn-green">Войти / Sign in</button>
        </div>
    </div>
    </section>
</form>
<section class="forget">
    <div class="forget1">
        <h3>Забыли пароль?</h3>
        <p><a href="#">Восстановить</a> </p>
    </div>
</section>
<section class="accnow">
    <div class="container reg">
        <p>Еще нет аккаунта? / Don't have an account yet?</p>
        <a href="registration.html" class="btn-grey">Зарегистрироваться / Create account</a>
    </div>
</section>
<script src="app.js" defer></script>
</body>
</html>
